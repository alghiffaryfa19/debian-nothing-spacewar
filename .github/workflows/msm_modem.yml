name: Build Debian Package (msm-modem)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git build-essential devscripts debhelper meson ninja-build pkg-config tree

      - name: Clone msm-modem source
        run: |
          git clone https://gitlab.postmarketos.org/postmarketOS/msm-modem.git
          cd msm-modem
          git submodule update --init --recursive

      - name: Copy Debian packaging
        run: |
          cp -r debian msm-modem/

      - name: Build .deb package
        working-directory: msm-modem
        run: |
          dpkg-buildpackage -us -uc -b

      - name: Show build result
        run: |
          ls -lh msm-modem/..
          tree msm-modem/..

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: msm-modem-deb
          path: msm-modem/../*.deb