name: Build pd-mapper Debian Package

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y dpkg-dev fakeroot

      - name: Verify DEBIAN folder
        run: |
          ls -R pd-mapper/DEBIAN

      - name: Build .deb package
        run: |
          fakeroot dpkg-deb --build pd-mapper pd-mapper.deb

      - name: Show output
        run: |
          ls -lah *.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pd-mapper-deb
          path: pd-mapper.deb